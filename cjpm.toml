[package]
  cjc-version = "1.1.0"
  name = "termhelper"
  description = "Linux 终端智能助手 — 自然语言驱动 Shell 操作"
  version = "0.1.0"
  output-type = "executable"
  compile-option = "--static -Woff driver-arg -ldl"
  link-option = "-L/home/chiyuki/Projects/termhelper/thirdparty/ratatui/cangjie-tui-ffi/target/release -l:libcangjie_tui.a -lgcc_s -lutil -lrt -lpthread -lm -ldl -lc"

[dependencies]
  ratatui = { path = "thirdparty/ratatui/cangjie-ratatui-sdk" }
  naivejson = { path = "thirdparty/naivejson/naivejson" }

[target.aarch64-unknown-linux-gnu]
  [target.aarch64-unknown-linux-gnu.bin-dependencies]
    path-option = ["/home/chiyuki/Documents/Apps/cangjie/stdx/static/stdx"]

# ── 阶段 1 验证测试程序 ──

[package.package-configuration."termhelper.tests.concurrency_verify"]
  output-type = "executable"
  compile-option = "-Woff unused"

[package.package-configuration."termhelper.tests.signal_verify"]
  output-type = "executable"
  compile-option = "-Woff unused"

[package.package-configuration."termhelper.tests.ffi_pty_verify"]
  output-type = "executable"
  compile-option = "-Woff unused"

[package.package-configuration."termhelper.tests.http_verify"]
  output-type = "executable"
  compile-option = "-Woff unused"

[package.package-configuration."termhelper.tests.pty_integration"]
  output-type = "executable"
  compile-option = "-Woff unused"

[package.package-configuration."termhelper.tests.pty_context_verify"]
  output-type = "executable"
  compile-option = "-Woff unused"
